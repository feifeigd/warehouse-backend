mode = "master"
name = "master"
host = "127.0.0.1"
port = 46000
lifetime = 0

caf {
  middleman {
    enable-automatic-connections = false
    app-identifiers = ["distributed-nodes"]
    heartbeat-interval = 0ms
  }
  logger {
    console {
      format = "[%c:%p] %d %m"
      verbosity = "info"
    }
  }
}
