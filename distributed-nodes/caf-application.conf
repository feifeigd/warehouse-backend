# Default local config for debugger runs from the distributed-nodes folder.
# Each executable has its own role-specific defaults in its entry file.

caf {
  middleman {
    enable-automatic-connections = false
    app-identifiers = ["distributed-nodes"]
    heartbeat-interval = 0ms
  }
  logger {
    console {
      format = "[%c:%p] %d %m"
      verbosity = "info"
    }
  }
}
